services:
  mysql:
    image: mysql:8.0
    container_name: mysql-crud
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cruddb}
      MYSQL_USER: ${MYSQL_USER:-cruduser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-crudpass}
    ports:
      - "3306:3306"
    volumes:
      # 최초 기동 시에만 MYSQL_USER / MYSQL_DATABASE 가 반영됨. .env 만 바꾸면 Access denied →
      # 개발 DB 초기화: docker compose down -v 후 up (데이터 전부 삭제됨)
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD:-rootpass}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: spring-back
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-cruddb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-cruduser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-crudpass}
      GRADLE_USER_HOME: /root/.gradle
      # 브라우저 Origin(http://localhost:5173) — 로컬 Compose 전용
      CORS_ALLOWED_ORIGINS: http://localhost:5173

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-picstory2}
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - gradle_cache:/root/.gradle
      - /app/build
      - /app/.gradle
    # Dockerfile.dev 는 gradlew bootRun 이라 첫 기동 시 의존성·컴파일에 수 분 걸릴 수 있음
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --connect-timeout 2 http://127.0.0.1:8080/hello >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vite-front
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # 호스트 브라우저 → 호스트의 8080(백엔드 컨테이너). Vite는 이미 설정된 process.env를 .env보다 우선함
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  gradle_cache: